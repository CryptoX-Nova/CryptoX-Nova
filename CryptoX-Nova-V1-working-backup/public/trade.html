<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CryptoX Nova Trade</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>


<body>


<!-- SIDEBAR -->

<div class="sidebar">

<h2>CryptoX Nova</h2>


<ul class="sidebar-menu">


<li>
<a href="dashboard.html">
<i class="fa-solid fa-house"></i>
Dashboard
</a>
</li>


<li>
<a href="wallet.html">
<i class="fa-solid fa-wallet"></i>
Wallet
</a>
</li>


<li>
<a href="market.html">
<i class="fa-solid fa-chart-line"></i>
Market
</a>
</li>


<li class="active">
<a href="trade.html">
<i class="fa-solid fa-right-left"></i>
Trade
</a>
</li>


<li>
<a href="history.html">
<i class="fa-solid fa-clock"></i>
History
</a>
</li>


<li onclick="logout()">
<a href="#">
<i class="fa-solid fa-right-from-bracket"></i>
Logout
</a>
</li>


</ul>

</div>



<!-- MAIN -->

<div class="main">



<!-- HERO -->

<section class="trade-hero">

<div>

<small>
Crypto Exchange
</small>


<h1>
Trade Crypto
</h1>


<p>
Buy and sell digital assets instantly
</p>


</div>



<div class="trade-status">

<i class="fa-solid fa-circle"></i>

Trading Live

</div>


</section>




<!-- BALANCE -->

<section class="trade-balance">


<div>

<small>
Available Balance
</small>


<h1 id="balance">
USDT Balance: Loading...
</h1>


</div>


</section>





<!-- CHART -->

<section class="trade-chart card">


<h2>
BTC / USDT
</h2>


<div id="tvchart"></div>


</section>





<!-- ORDER PANEL -->

<section class="trade-panel">



<!-- BUY -->


<div class="order-box buy-box">


<h2>
<i class="fa-solid fa-cart-shopping"></i>
Buy Crypto
</h2>



<label>
Select Coin
</label>


<select id="coin">

<option value="BTC">
Bitcoin (BTC)
</option>


<option value="ETH">
Ethereum (ETH)
</option>


<option value="SOL">
Solana (SOL)
</option>


</select>



<label>
Amount (USDT)
</label>


<input
type="number"
id="amount"
placeholder="Enter amount">



<button onclick="buyCoin()">

Buy Now

</button>


</div>






<!-- SELL -->


<div class="order-box sell-box">


<h2>
<i class="fa-solid fa-arrow-up-right-dots"></i>
Sell Crypto
</h2>



<label>
Select Coin
</label>


<select id="sellCoin">


<option value="BTC">
Bitcoin (BTC)
</option>


<option value="ETH">
Ethereum (ETH)
</option>


<option value="SOL">
Solana (SOL)
</option>


</select>



<label>
Amount
</label>


<input
type="number"
id="sellAmount"
placeholder="Enter amount">



<button onclick="sellCoin()">

Sell Now

</button>


</div>



</section>





<div class="message-box">

<p id="message"></p>

</div>



</div>





<!-- MOBILE NAV -->

<div class="mobile-nav">


<a href="dashboard.html">
<i class="fa-solid fa-house"></i>
<span>Home</span>
</a>


<a href="wallet.html">
<i class="fa-solid fa-wallet"></i>
<span>Wallet</span>
</a>


<a href="market.html">
<i class="fa-solid fa-chart-line"></i>
<span>Market</span>
</a>


<a href="trade.html">
<i class="fa-solid fa-right-left"></i>
<span>Trade</span>
</a>


<a href="history.html">
<i class="fa-solid fa-clock"></i>
<span>History</span>
</a>


</div>





<script src="https://s3.tradingview.com/tv.js"></script>


<script>

new TradingView.widget({

container_id:"tvchart",

autosize:true,

symbol:"BINANCE:BTCUSDT",

interval:"30",

timezone:"Asia/Manila",

theme:"dark",

style:"1",

locale:"en",

toolbar_bg:"#111827",

enable_publishing:false,

allow_symbol_change:true,

save_image:false

});

</script>



<script src="js/logout.js"></script>

<script src="js/trade.js"></script>


</body>

</html>
