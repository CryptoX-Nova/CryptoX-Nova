href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">


</head>


<body>



<!-- SIDEBAR -->

<div class="sidebar">


<h2>
CryptoX Nova
</h2>



<ul class="sidebar-menu">



<li>

<a href="dashboard.html">

<i class="fa-solid fa-house"></i>

<span>
Dashboard
</span>

</a>

</li>





<li>

<a href="wallet.html">

<i class="fa-solid fa-wallet"></i>

<span>
Wallet
</span>

</a>

</li>





<li>

<a href="exchange-wallet.html">

<i class="fa-solid fa-building-columns"></i>

<span>
Exchange Wallet
</span>

</a>

</li>





<li>

<a href="trade.html">

<i class="fa-solid fa-right-left"></i>

<span>
Trade
</span>

</a>

</li>





<li class="active">

<a href="deposit.html">

<i class="fa-solid fa-circle-plus"></i>

<span>
Deposit
</span>

</a>

</li>





<li>

<a href="withdraw.html">

<i class="fa-solid fa-money-bill-transfer"></i>

<span>
Withdraw
</span>

</a>

</li>





<li>

<a href="history.html">

<i class="fa-solid fa-clock-rotate-left"></i>

<span>
History
</span>

</a>

</li>



</ul>


</div>







<!-- MAIN -->

<div class="main">





<section class="nova-header">


<div>


<h2>
Deposit Assets
</h2>


<p>
Add funds to your CryptoX Nova wallet securely.
</p>


</div>




<div class="header-status">

<i class="fa-solid fa-circle"></i>

Wallet Active

</div>


</section>









<!-- DEPOSIT CARD -->


<section class="action-card">


<div class="action-header">


<h2>

<i class="fa-solid fa-circle-plus"></i>

Deposit Funds

</h2>


<p>
Choose your asset and enter deposit amount.
</p>


</div>








<div class="action-input">


<label>
Select Coin
</label>


<select id="coin">


<option value="USDT">
USDT
</option>


<option value="BTC">
BTC
</option>


<option value="ETH">
ETH
</option>


<option value="SOL">
SOL
</option>


</select>


</div>







<div class="action-input">


<label>
Deposit Amount
</label>


<input

type="number"

id="amount"

placeholder="Enter amount"

>


</div>







<div class="balance-text">


Current Balance:

<span id="balance">

0.00

</span>


</div>








<button 
class="primary-action-btn"
onclick="submitDeposit()"
>


<i class="fa-solid fa-wallet"></i>


Submit Deposit Request


</button>







<p id="message"></p>




</section>







</div>








<script src="js/deposit.js"></script>


</body>

</html>
