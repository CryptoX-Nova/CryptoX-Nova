<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CryptoX Pro Dashboard</title>

<link 
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css"
rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<div class="container mt-5">


<h1>
CryptoX Pro Dashboard
</h1>



<!-- WALLET -->

<div class="card mt-4 p-3">

<h3>
Wallet
</h3>


<div id="wallet">

Loading wallet...

</div>


</div>





<!-- TRADE HISTORY -->

<div class="card mt-4 p-3">


<h3>
Trade History
</h3>


<table class="table">


<thead>

<tr>

<th>Type</th>

<th>Coin</th>

<th>Price</th>

<th>Amount</th>

<th>Total</th>

<th>Date</th>

</tr>

</thead>



<tbody id="tradeHistory">


</tbody>


</table>


</div>




</div>



<script src="js/dashboard.js"></script>


</body>

</html>
