<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CryptoX Nova - Trade</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>


<body>


<!-- SIDEBAR -->

<div class="sidebar">

<h2>
CryptoX Nova
</h2>


<ul class="sidebar-menu">


<li>
<a href="dashboard.html">
<i class="fa-solid fa-house"></i>
Dashboard
</a>
</li>


<li>
<a href="wallet.html">
<i class="fa-solid fa-wallet"></i>
Wallet
</a>
</li>


<li>
<a href="exchange-wallet.html">
<i class="fa-solid fa-building-columns"></i>
Exchange Wallet
</a>
</li>


<li class="active">
<a href="trade.html">
<i class="fa-solid fa-right-left"></i>
Trade
</a>
</li>


<li>
<a href="deposit.html">
<i class="fa-solid fa-circle-plus"></i>
Deposit
</a>
</li>


<li>
<a href="withdraw.html">
<i class="fa-solid fa-money-bill-transfer"></i>
Withdraw
</a>
</li>


<li>
<a href="history.html">
<i class="fa-solid fa-clock"></i>
History
</a>
</li>


</ul>

</div>





<!-- MAIN -->

<div class="main">



<section class="nova-header">

<div>

<h2>
Crypto Trading
</h2>

<p>
Buy and sell digital assets instantly.
</p>

</div>


<div class="header-status">

<i class="fa-solid fa-circle"></i>

Market Live

</div>


</section>






<!-- BALANCE -->

<section class="card">

<h3>
Available Balance
</h3>


<h1 id="balance">

USDT Balance: Loading...

</h1>


</section>








<!-- BUY -->

<section class="action-card">


<div class="action-header">

<h2>
<i class="fa-solid fa-cart-shopping"></i>
Buy Crypto
</h2>

</div>




<label>
Select Coin
</label>


<select id="coin">

<option value="BTC">
Bitcoin (BTC)
</option>


<option value="ETH">
Ethereum (ETH)
</option>


<option value="SOL">
Solana (SOL)
</option>


</select>






<label>
Amount (USDT)
</label>


<input

type="number"

id="amount"

placeholder="Enter USDT amount"

>





<button onclick="buyCoin()" class="buy-btn">

<i class="fa-solid fa-arrow-up"></i>

Buy Now

</button>



</section>








<!-- SELL -->


<section class="action-card">


<div class="action-header">

<h2>
<i class="fa-solid fa-arrow-down"></i>
Sell Crypto
</h2>

</div>



<label>
Select Coin
</label>


<select id="sellCoin">

<option value="BTC">
Bitcoin (BTC)
</option>


<option value="ETH">
Ethereum (ETH)
</option>


<option value="SOL">
Solana (SOL)
</option>


</select>





<label>
Amount Coin
</label>


<input

type="number"

id="sellAmount"

placeholder="Enter coin amount"

>




<button onclick="sellCoin()" class="sell-btn">


Sell Now


</button>



</section>







<!-- MESSAGE -->

<div class="message-box">

<p id="message"></p>

</div>







<!-- CHART -->


<section class="card">


<h3>
Live Market Chart
</h3>


<div id="tradingview_chart"></div>


</section>



</div>







<script src="https://s3.tradingview.com/tv.js"></script>

<script src="js/chart.js"></script>

<script src="js/trade.js"></script>


</body>

</html>
